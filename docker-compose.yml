

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: boookz_db
      POSTGRES_USER: boookz_user
      POSTGRES_PASSWORD: boookz_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boookz_user -d boookz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=boookz_db
      - POSTGRES_USER=boookz_user
      - POSTGRES_PASSWORD=boookz_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgres://boookz_user:boookz_password@db:5432/boookz_db
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=admin
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.connect((\"localhost\", 8000))' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://web:8000
      - API_BASE_URL_PUBLIC=http://localhost:8000
      - HOST=0.0.0.0
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
